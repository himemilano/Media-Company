name: "🧩 Japan Kids Compass - Production Pipeline"

on:
  schedule:
    - cron: '0 9 * * 1,3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-generate-video:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Validate LFS Integrity
      run: |
        git lfs install
        git lfs pull
        echo "--- 🔍 Checking file sizes (LFS Verification) ---"
        ls -lh templates/kids_compass/
        # 1MB以下のファイルがテンプレートにある場合、LFSが未同期とみなして中断する
        find templates/kids_compass/ -name "*.mp4" -size -1M | grep . && exit 1 || echo "✅ LFS files verified."

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-dejavu-core
        pip install --upgrade pip
        pip install Pillow requests google-api-python-client google-auth-oauthlib google-auth-httplib2 edge-tts

    - name: Run Auto Video Generator
      env:
        GEMINI_API_KEY_MEDIA: ${{ secrets.GEMINI_API_KEY_MEDIA }}
      run: |
        echo "=== 🎬 起動: 厳密モード ==="
        cd channels/kids_compass
        # 一時ディレクトリのクリーンアップ
        rm -rf workspace/* temp_assets/*
        python main.py

    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add -A
        git commit -m "📦 [Kids Compass] 安全確認済み動画を格納" || echo "変更なし"
        git push
