name: "🧩 Japan Kids Compass - Scheduled Video Production & Direct Upload"

on:
  schedule:
    # 毎週 月曜日、水曜日の日本時間 18:00 に自動実行 (UTC 9:00)
    - cron: '0 9 * * 1,3'
  workflow_dispatch: # 手動実行用ボタン

permissions:
  contents: write

jobs:
  build-and-generate-video:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # 🎥 映像・音声の合成に不可欠な「FFmpeg」をLinuxコンテナにインストール
        sudo apt-get install -y ffmpeg

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        # 必要ライブラリと【🎙️ ナレーション用の edge-tts】をコンテナ環境へ一括導入
        pip install Pillow requests google-api-python-client google-auth-oauthlib google-auth-httplib2 edge-tts

    - name: Run Auto Video Generator & YouTube Upload
      env:
        # 🔑 メディア企業統一のGemini APIキーをバインド
        GEMINI_API_KEY_MEDIA: ${{ secrets.GEMINI_API_KEY_MEDIA }}
        # YouTube投稿用 OAuth認証情報（💡 Japan Kids Compass専用のトークンシークレットを指定）
        YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_JKC }}
      run: |
        echo "=== 🎬 Japan Kids Compass 自動レンダリングエンジン起動 ==="
        cd channels/kids_compass
        python main.py

    - name: Commit and Push Completed Video Assets
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add -A
        git commit -m "📦 [Kids Compass] ナレーション・テロップ付き完成版Shorts動画をリポジトリへ格納しました [skip ci]" || echo "変更なし"
        git push
